# WNS-to-JADT preprocessing defaults for the reproduction package.
#
# These settings document the deterministic transformation used for the JADT
# camera-ready real-data analyses. They are intentionally aligned with the
# original WNS emoji-string utility, with paper-specific choices for skin tone
# and gender handling.

[posts]
xml_pattern = wns_chat_*.xml

[emoji]
segment_delimiter = -
join_emoji_sequences = true
strip_variation_selectors = true
strip_skin_tone = true
strip_gender = false
include_system = false

[lexical]
mode = text
include_system = false
