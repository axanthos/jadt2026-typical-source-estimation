# Paper-specific WNS preprocessing contract for the JADT 2026 reproduction package.
# These defaults are documented here for auditability; the CLI scripts expose the
# same choices as explicit flags.

[posts]
xml_pattern = wns_chat_*.xml

[emoji]
segment_delimiter = -
strip_variation_selectors = true
strip_skin_tone = true
strip_gender = false
include_system = false

[lexical]
include_system = false
